<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CZO Signature Verifier Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background-color: #f8f9fa;
      color: #212529;
      max-width: 600px;
    }
    h2 {
      color: #004085;
      border-bottom: 2px solid #dee2e6;
      padding-bottom: 8px;
      margin-top: 0;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 14px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-size: 14px;
      border: 1px solid #ced4da;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .help-text {
      font-size: 12px;
      color: #6c757d;
      margin-top: 4px;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }
    .checkbox-group input[type="checkbox"] {
      margin-right: 10px;
      width: 16px;
      height: 16px;
    }
    .btn {
      display: inline-block;
      font-weight: 500;
      text-align: center;
      vertical-align: middle;
      cursor: pointer;
      user-select: none;
      background-color: #007bff;
      border: 1px solid #007bff;
      color: white;
      padding: 8px 16px;
      font-size: 14px;
      border-radius: 4px;
      transition: background-color 0.15s ease-in-out;
    }
    .btn:hover {
      background-color: #0056b3;
    }
    .status-msg {
      margin-top: 12px;
      font-size: 14px;
      font-weight: 600;
      color: #28a745;
      display: none;
    }
  </style>
</head>
<body>
  <h2>CZO Signature Verifier - Settings</h2>

  <form id="settings-form">
    <!-- Subdirectory setting -->
    <div class="form-group">
      <label for="subfolder">Downloads Subdirectory:</label>
      <input type="text" id="subfolder" value="CZO-Verify-Results">
      <div class="help-text">
        The subfolder name inside your system Downloads directory where CZO receipt files will be saved.
      </div>
    </div>

    <!-- Ask where to save -->
    <div class="checkbox-group">
      <input type="checkbox" id="askWhereToSave">
      <label for="askWhereToSave" style="font-weight: normal; margin-bottom: 0;">
        Ask where to save each file (display system file picker)
      </label>
    </div>

    <!-- Enable Debug Mode -->
    <div class="checkbox-group">
      <input type="checkbox" id="verbose" checked>
      <label for="verbose" style="font-weight: normal; margin-bottom: 0;">
        Enable Debug/Verbose Mode (maintain detailed in-popup log console)
      </label>
    </div>

    <button type="submit" class="btn">Save Settings</button>
  </form>

  <div id="status" class="status-msg">Settings saved successfully!</div>

  <script src="options.js"></script>
</body>
</html>
